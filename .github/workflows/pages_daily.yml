# .github/workflows/pages.yml
name: Build and Deploy Pages (Daily)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Last.fm tag"
        required: false
        default: ""
      n:
        description: "Candidate size"
        required: true
        default: "30"
      topk:
        description: "TopK"
        required: true
        default: "10"
  schedule:
    # UTC 21:17 = Asia/Shanghai (+08:00) 05:17 next day
    - cron: "17 21 * * *"

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      DAILY3ALBUMS_TZ: Asia/Shanghai
      # Published static archive seed source. Leave the repository variable empty
      # until the custom domain is live; the restore script will keep using the
      # existing GitHub Pages project URL fallback.
      DAILY3ALBUMS_PAGES_BASE_URL: ${{ vars.DAILY3ALBUMS_PAGES_BASE_URL }}

      # Last.fm
      LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
      LASTFM_SHARED_SECRET: ${{ secrets.LASTFM_SHARED_SECRET }}

      # MusicBrainz
      MB_USER_AGENT: ${{ secrets.MB_USER_AGENT }}

      # ListenBrainz
      LISTENBRAINZ_USER_TOKEN: ${{ secrets.LISTENBRAINZ_USER_TOKEN }}
      LISTENBRAINZ_USERNAME: ${{ vars.LISTENBRAINZ_USERNAME }}

      # Discogs
      DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
      DISCOGS_CONSUMER_KEY: ${{ secrets.DISCOGS_CONSUMER_KEY }}
      DISCOGS_CONSUMER_SECRET: ${{ secrets.DISCOGS_CONSUMER_SECRET }}
      DISCOGS_USER_AGENT: ${{ secrets.DISCOGS_USER_AGENT }}

      # Discogs OAuth endpoints（非敏感：建议用 Repository Variables）
      DISCOGS_REQUEST_TOKEN_URL: ${{ vars.DISCOGS_REQUEST_TOKEN_URL }}
      DISCOGS_AUTHORIZE_URL: ${{ vars.DISCOGS_AUTHORIZE_URL }}
      DISCOGS_ACCESS_TOKEN_URL: ${{ vars.DISCOGS_ACCESS_TOKEN_URL }}

      # SMTP（你只有真的要发邮件时才需要；其中密码务必是 Secret）
      SMTP_HOST: ${{ vars.SMTP_HOST }}
      SMTP_PORT: ${{ vars.SMTP_PORT }}
      SMTP_ENCRYPTION: ${{ vars.SMTP_ENCRYPTION }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Jitter (0-120s)
        run: |
          delay=$((RANDOM % 121))
          echo "Sleeping for ${delay}s to avoid cron stampede"
          sleep "${delay}"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Start build metrics
        run: python scripts/build_metrics.py start

      - name: Install (Python package)
        run: |
          python -m pip install --upgrade pip
          python scripts/build_metrics.py run --name "Install Python package" -- python -m pip install -e ".[doctor]"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: python scripts/build_metrics.py run --name "npm ci" -- npm --prefix ui ci

      # ✅ 方案A附加：UI 单测（防止 resolveCoverUrl 被回滚/误删）
      - name: Run UI tests
        run: python scripts/build_metrics.py run --name "UI test" -- npm --prefix ui test

      - name: Run Python tests
        run: python scripts/build_metrics.py run --name "pytest" -- python -m pytest

      - name: Restore state cache
        uses: actions/cache@v5
        with:
          path: .state
          key: state-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            state-${{ runner.os }}-${{ github.ref_name }}-
            state-${{ runner.os }}-

      - name: Prune old state files
        run: |
          if [ -d .state ]; then
            find .state -type f -name '*.jsonl' -mtime +30 -delete
          fi

      - name: Build UI
        run: python scripts/build_metrics.py run --name "UI build" -- npm --prefix ui run build

      - name: Restore published archive seed
        run: python scripts/build_metrics.py run --name "Restore archive seed" -- python scripts/restore_static_archive_seed.py --out .state/pages-history-seed/data --max-days 7

      # ✅ 方案A核心：每次都“真正重新生成”
      # 同时把 workflow_dispatch 的 n/topk/tag 接进 build 参数，避免你以为填了其实没生效
      - name: Build daily3albums artifacts
        env:
          INPUT_N: ${{ github.event.inputs.n }}
          INPUT_TOPK: ${{ github.event.inputs.topk }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          DAILY3ALBUMS_HISTORY_SEED_DIR: .state/pages-history-seed/data
        run: |
          args=(--verbose --skip-ui-build)
          if [ -n "${INPUT_N:-}" ]; then
            args+=(--n "$INPUT_N")
          fi
          if [ -n "${INPUT_TOPK:-}" ]; then
            args+=(--topk "$INPUT_TOPK")
          fi
          if [ -n "${INPUT_TAG:-}" ]; then
            args+=(--tag "$INPUT_TAG")
          fi
          printf 'daily3albums build args:'
          printf ' %q' "${args[@]}"
          printf '\n'
          python scripts/build_metrics.py run --name "daily3albums build" -- daily3albums build "${args[@]}"

      # ✅ 方案A附加：生成 data/meta.json，给前端做版本参数/对齐用
      - name: Write data/meta.json
        run: |
          mkdir -p _build/public/data
          python - <<'PY'
          import json, os, datetime

          tz = os.getenv("TZ", "Asia/Shanghai")
          now = datetime.datetime.now().astimezone().isoformat(timespec="seconds")

          meta = {
            "build_id": os.getenv("GITHUB_RUN_ID"),
            "run_number": os.getenv("GITHUB_RUN_NUMBER"),
            "attempt": os.getenv("GITHUB_RUN_ATTEMPT"),
            "sha": os.getenv("GITHUB_SHA"),
            "ref": os.getenv("GITHUB_REF"),
            "built_at": now,
            "tz": tz,
            "workflow": os.getenv("GITHUB_WORKFLOW"),
          }

          path = "_build/public/data/meta.json"
          with open(path, "w", encoding="utf-8") as f:
            json.dump(meta, f, ensure_ascii=False, indent=2)

          print(f"Wrote {path}")
          PY

      - name: Self-check output
        run: python scripts/build_metrics.py run --name "self_check" -- python scripts/self_check.py --path _build/public

      - name: Summarize build metrics
        if: always()
        continue-on-error: true
        run: python scripts/build_metrics.py summarize --public _build/public --out .state/build-metrics/build-metrics.json

      - name: Summarize recommendation observability
        if: always()
        continue-on-error: true
        run: python scripts/recommendation_observability_summary.py --path _build/public/data/recommendation-observability.json --github-summary

      - name: Maintain state SQLite cache
        if: always()
        run: |
          python - <<'PY'
          from __future__ import annotations

          import sqlite3
          import time
          from pathlib import Path

          db_path = Path(".state/cache.sqlite")
          related_paths = [
              db_path,
              Path(f"{db_path}-wal"),
              Path(f"{db_path}-shm"),
          ]

          def total_size() -> int:
              return sum(path.stat().st_size for path in related_paths if path.exists())

          if not db_path.exists():
              print("state_cache_sqlite status=missing action=skip rows_before=0 rows_after=0 bytes_before=0 bytes_after=0")
              raise SystemExit(0)

          bytes_before = total_size()
          vacuum_ran = False

          conn = sqlite3.connect(db_path)
          try:
              table_exists = conn.execute(
                  "SELECT 1 FROM sqlite_master WHERE type='table' AND name='http_cache'"
              ).fetchone()
              if not table_exists:
                  print(
                      "state_cache_sqlite status=no_http_cache_table action=skip "
                      f"rows_before=0 rows_after=0 bytes_before={bytes_before} bytes_after={total_size()}"
                  )
                  raise SystemExit(0)

              rows_before = int(conn.execute("SELECT COUNT(*) FROM http_cache").fetchone()[0])
              now_epoch = int(time.time())
              expired_rows = int(
                  conn.execute("SELECT COUNT(*) FROM http_cache WHERE expires_at <= ?", (now_epoch,)).fetchone()[0]
              )
              conn.execute("DELETE FROM http_cache WHERE expires_at <= ?", (now_epoch,))
              conn.commit()
              rows_after = int(conn.execute("SELECT COUNT(*) FROM http_cache").fetchone()[0])

              if expired_rows:
                  conn.execute("PRAGMA wal_checkpoint(TRUNCATE)")
                  conn.execute("VACUUM")
                  conn.commit()
                  vacuum_ran = True
          finally:
              conn.close()

          bytes_after = total_size()
          print(
              "state_cache_sqlite status=ok "
              f"rows_before={rows_before} rows_after={rows_after} expired_deleted={expired_rows} "
              f"bytes_before={bytes_before} bytes_after={bytes_after} vacuum={str(vacuum_ran).lower()}"
          )
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _build/public

      - name: Report failure to issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const tz = "Asia/Shanghai";
            const date = new Date().toLocaleDateString("en-CA", { timeZone: tz });
            const title = `Daily build failure ${date}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Workflow failed on ${date} (${tz}).`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `Please review the build logs in GitHub Actions.`
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });

            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }} 
